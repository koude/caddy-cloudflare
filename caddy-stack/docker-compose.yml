services:
  caddy:
    image: ${CADDY_IMAGE:-ghcr.io/YOUR_GITHUB_USERNAME/caddy-cloudflare:latest}
    container_name: caddy
    network_mode: host
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./routes:/etc/caddy/routes:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
